<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Beneficiaries vs Disrupted Buckets</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0b1020; color: #e8eefc; }
    main { max-width: 1200px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { color: #aab6d3; margin-bottom: 18px; }
    .card { background: #121a33; border: 1px solid #263453; border-radius: 16px; padding: 14px; margin: 18px 0; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .chart { width: 100%; height: 560px; }
    .meta { color: #aab6d3; font-size: 14px; line-height: 1.45; }
    a { color: #8ab4ff; }
  </style>
</head>
<body>
<main>
  <h1>AI Bucket Indexes</h1>
  <div class="sub">Equal-weighted category indexes, indexed to $100 over the trailing two years. Data refreshes daily from Yahoo Finance.</div>
  <div class="card"><div id="beneficiary" class="chart"></div></div>
  <div class="card"><div id="disrupted" class="chart"></div></div>
  <div class="card meta" id="meta">Loading metadata…</div>
</main>
<script>
async function csvText(url) { const r = await fetch(url + '?v=' + Date.now()); if (!r.ok) throw new Error(url); return r.text(); }
function parseCSV(text) {
  const rows = []; let row = [], cur = '', q = false;
  for (let i=0;i<text.length;i++) { const c=text[i], n=text[i+1];
    if (q && c==='"' && n==='"') { cur+='"'; i++; }
    else if (c==='"') q=!q;
    else if (!q && c===',') { row.push(cur); cur=''; }
    else if (!q && (c==='\n' || c==='\r')) { if (cur || row.length) { row.push(cur); rows.push(row); row=[]; cur=''; } if (c==='\r' && n==='\n') i++; }
    else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  const headers = rows.shift();
  return rows.filter(r => r.length === headers.length).map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}
function plot(div, data, category, title) {
  const cols = Object.keys(data[0]).filter(c => c.includes(`| ${category} |`));
  const traces = cols.map(c => ({ x: data.map(r => r.Date), y: data.map(r => Number(r[c]) || null), mode: 'lines', name: c.replace(/^V2G\d+ \| /,''), hovertemplate: '%{x}<br>%{fullData.name}: $%{y:.1f}<extra></extra>' }));
  Plotly.newPlot(div, traces, {
    title: { text: title, font: { color: '#e8eefc' } },
    paper_bgcolor: '#121a33', plot_bgcolor: '#121a33',
    font: { color: '#dce6fb' },
    xaxis: { gridcolor: '#263453' }, yaxis: { title: 'Indexed value ($100 start)', gridcolor: '#263453', tickprefix: '$' },
    legend: { orientation: 'h', y: -0.22 }, margin: { l: 60, r: 20, t: 55, b: 120 },
    hovermode: 'x unified'
  }, {responsive: true});
}
(async function main(){
  const [csv, meta] = await Promise.all([csvText('data/bucket_indexes.csv'), fetch('data/metadata.json?v=' + Date.now()).then(r => r.json())]);
  const data = parseCSV(csv);
  plot('beneficiary', data, 'Beneficiary', 'AI Beneficiary Buckets');
  plot('disrupted', data, 'Disrupted', 'AI Disrupted Buckets');
  document.getElementById('meta').innerHTML = `Source: ${meta.source}. Price field: ${meta.price_field}.<br>Range: ${meta.start_date} to ${meta.end_date}. Full-period tickers: ${meta.full_period_tickers}.<br>Partial-history excluded from main charts: ${meta.partial_history_tickers.join(', ') || 'None'}. Missing: ${meta.missing_tickers.join(', ') || 'None'}.`;
})().catch(e => { document.body.innerHTML = '<main><h1>Error loading dashboard</h1><pre>' + e.stack + '</pre></main>'; });
</script>
</body>
</html>
